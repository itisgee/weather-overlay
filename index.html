<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherHolidays Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      background: none !important;
    }

    .wrap {
      position: fixed;
      left: 30px;
      bottom: 30px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .brand {
      background: rgba(0, 0, 0, 0.68);
      color: #ffffff;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-badge {
      background: #d60000;
      color: #ffffff;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 900;
      font-size: 24px;
      line-height: 1;
      display: inline-block;
    }

    .data {
      background: rgba(8, 45, 87, 0.82);
      color: #ffffff;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span>🌪️ WEATHERHOLIDAYS</span>
      <span class="live-badge">LIVE</span>
    </div>

    <div class="data">
      ↗ NE | 62 mph
    </div>
  </div>
</body>
</html>
