<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherHolidays Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      background: none !important;
    }

  .wrap {
      position:fixed;
      left:30px;
      bottom:30px;
    }

    .brand {
      background: rgba(0, 0, 0, 0.68);
      color: #ffffff;
      padding: 6px 9px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo {
      height: 42px;
      width: auto;
      display: block;
    }

    .wh-wrap {
      display: flex;
      align-items: center;
    }

    .w {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -3px;
      color: #ffffff;
      line-height: 1;
    }

    .h {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 24px;
      letter-spacing: -6px;
      color: #ffffff;
      line-height: 1;
      margin-left: 5px;
    }

    .live {
      color: #e10600;
      font-weight: 900;
      font-size: 22px;
      line-height: 1;
      margin-left: 6px;
      font-family: 'Montserrat', sans-serif;
    }

    
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="logo.png" class="logo" alt="WeatherHolidays logo" />
      <div class="wh-wrap">
        <span class="w">W</span><span class="h">H</span>
      </div>
      <span class="live">LIVE</span>
    </div>
   
  </div>
</body>
</html>
