<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherHolidays Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      background: none !important;
    }

    .wrap {
      position: fixed;
      left: 30px;
      bottom: 30px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .brand {
      background: rgba(0, 0, 0, 0.68);
      color: #ffffff;
      padding: 12px 16px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      height: 42px;
      width: auto;
      display: block;
    }

    .wh-wrap {
      display: flex;
      align-items: center;
    }

    .w {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 30px;
      letter-spacing: -3px;
      color: #ffffff;
      line-height: 1;
    }

    .h {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 30px;
      letter-spacing: -3px;
      color: #ffffff;
      line-height: 1;
      margin-left: -8px;
    }

    .live {
      color: #e10600;
      font-weight: 900;
      font-size: 26px;
      line-height: 1;
      margin-left: 10px;
      font-family: 'Montserrat', sans-serif;
    }

    .data {
      background: rgba(8, 45, 87, 0.85);
      color: #ffffff;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
      font-family: 'Montserrat', sans-serif;
      white-space: nowrap;
    }

    .place {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .meta {
      display: block;
      font-size: 20px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="logo.png" class="logo" alt="WeatherHolidays logo" />
      <div class="wh-wrap">
        <span class="w">W</span><span class="h">H</span>
      </div>
      <span class="live">LIVE</span>
    </div>

    <div class="data">
      <span class="place">📍 Near <% gps_place("locality, admin_area", en_GB) %></span>
      <span class="meta">↗ <% gps_heading(mag, r8) %> | <% gps_speed(mi/h) %> mph</span>
    </div>
  </div>
</body>
</html>
