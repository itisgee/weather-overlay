<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body{
margin:0;
padding:0;
background:transparent !important;
overflow:hidden;
font-family:Arial, sans-serif;
}

.wrap{
position:fixed;
left:30px;
bottom:30px;
display:flex;
gap:12px;
align-items:center;
}

/* Main brand box */
.brand{
background:rgba(0,0,0,0.7);
padding:6px 8px;
border-radius:14px;
display:flex;
align-items:center;
gap:10px;
}

/* Logo */
.logo{
height:32px;
width:auto;
}

/* WH text */
.w{
font-family:'Montserrat',sans-serif;
font-weight:800;
font-size:24px;
letter-spacing:-3px;
color:white;
}

.h{
font-family:'Montserrat',sans-serif;
font-weight:500;
font-size:24px;
letter-spacing:-3px;
color:white;
margin-left:-8px;
}
  
/* LIVE text */
.live{
color:#e10600;
font-weight:900;
font-size:20px;
}

/* Data box */
.data{
background:rgba(8,45,87,0.85);
color:#ffffff;
padding:6px 8px;
border-radius:14px;
font-size:16px;
font-weight:700;
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
}
</style>
</head>

<body>

<div class="wrap">

<div class="brand">
<img src="logo.png" class="logo">
<span class="w">W</span><span class="h">H</span>
<span class="live">LIVE</span>
</div>

<div class="data">
↗ NE | 62 mph
</div>

</div>

</body>
</html>
